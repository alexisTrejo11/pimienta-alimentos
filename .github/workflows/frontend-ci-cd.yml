name: Frontend CI-CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"

permissions:
  contents: read
  packages: write
  actions: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ---------------------------------------------------------------------------
  # Build Angular project (compile check)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular project
        run: npm run build

  # ---------------------------------------------------------------------------
  # Login, build and push Docker image to ghcr.io
  # ---------------------------------------------------------------------------
  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Require production build args
        env:
          API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
          ALLOWED_HOSTS: ${{ vars.FRONTEND_ALLOWED_HOSTS }}
        run: |
          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::Set repository variable FRONTEND_API_BASE_URL (e.g. https://api.example.com/api/v1)"
            exit 1
          fi
          if [ -z "${ALLOWED_HOSTS:-}" ]; then
            echo "FRONTEND_ALLOWED_HOSTS unset; defaulting to localhost"
            echo "ALLOWED_HOSTS=localhost" >> "$GITHUB_ENV"
          else
            echo "ALLOWED_HOSTS=${ALLOWED_HOSTS}" >> "$GITHUB_ENV"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            API_BASE_URL=${{ vars.FRONTEND_API_BASE_URL }}
            ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Deploy - SSH via Cloudflare Access, then pull/restart this project's service.
  # ---------------------------------------------------------------------------
  deploy:
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configure SSH over Cloudflare Access
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Same private key you use locally (e.g. fedora-host).
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Alias "deploy-host" = Cloudflare Access SSH hostname.
          # Service Token auth must NOT go in ProxyCommand as --id/--secret:
          # cloudflared treats those positionals as a listen address ("missing port").
          # Pass CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET via env on the ssh step.
          {
            echo "Host deploy-host"
            echo "  HostName ${SSH_HOST}"
            echo "  User ${SSH_USER}"
            echo "  IdentityFile ~/.ssh/id_ed25519"
            echo "  IdentitiesOnly yes"
            echo "  ProxyCommand cloudflared access ssh --hostname %h"
            echo "  StrictHostKeyChecking accept-new"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH (GHCR pull + restart)
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ghcr.io/${{ github.repository }}/frontend
          # cloudflared picks these up for non-interactive Access (Service Token).
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"

          # printf %q keeps tokens with special chars safe inside the remote shell.
          ssh deploy-host \
            "export GHCR_TOKEN=$(printf '%q' "$GHCR_TOKEN") GHCR_USER=$(printf '%q' "$GHCR_USER") IMAGE=$(printf '%q' "$IMAGE"); bash -s" <<'REMOTE'
          set -euo pipefail

          cd ~/homelab/deploys/apps/pimienta-frontend

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          export IMAGE="${IMAGE}:latest"
          docker compose pull web
          docker compose up -d --remove-orphans web

          # Safe cleanup: only unused images for THIS project (not host-wide prune).
          IMAGE_REPO="${IMAGE%:*}"
          echo "Cleaning unused images for $IMAGE_REPO only..."
          docker images "$IMAGE_REPO" --format '{{.ID}}' | sort -u | while read -r id; do
            if [ -z "$(docker ps -aq --filter "ancestor=${id}")" ]; then
              docker rmi "$id" 2>/dev/null || true
            fi
          done

          docker logout ghcr.io || true
          echo "Deploy finished."
          REMOTE
