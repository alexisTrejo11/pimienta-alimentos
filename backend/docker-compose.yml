name: pimienta-backend

# Optional internal network when running local Postgres (see commented `postgres` service).
# networks:
#   pimienta:
#     driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Local Postgres (optional — disabled; app uses AWS RDS via .env POSTGRES_URL)
  #
  # To use local Postgres instead of RDS:
  #   1. Uncomment `postgres` below and `pimienta_pg_data` under volumes.
  #   2. Uncomment `networks` above and attach services to `pimienta`.
  #   3. Uncomment `depends_on.postgres` on `api`.
  #   4. Set POSTGRES_URL=jdbc:postgresql://postgres:5432/<db>?currentSchema=pimienta
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-pimienta_alimentos}
  #     POSTGRES_USER: ${POSTGRES_USER:-pimienta_dba}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pimienta_dba}
  #   ports:
  #     - "${POSTGRES_PORT:-5431}:5432"
  #   volumes:
  #     - pimienta_pg_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "pg_isready -U ${POSTGRES_USER:-pimienta_dba} -d ${POSTGRES_DB:-pimienta_alimentos}",
  #       ]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10
  #   networks:
  #     - pimienta

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6378}:6379"
    volumes:
      - pimienta_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # networks:
    #   - pimienta

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      # Compose reads .env for ${...} substitution only; each name must appear here (or env_file)
      # for the process inside the container to see it. Dotenv in the app only reads a .env on disk.
      SPRING_PROFILES_ACTIVE: docker
      # AWS RDS (host reachable from container network / host.docker.internal if needed)
      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SERVER_PORT: "8080"
      PIMIENTA_SECURITY_JWT_SECRET: ${PIMIENTA_SECURITY_JWT_SECRET}
      JAVA_OPTS: ${JAVA_OPTS:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_FOLDER: ${AWS_S3_FOLDER:-employees}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    # networks:
    #   - pimienta

volumes:
  # pimienta_pg_data:
  pimienta_redis_data:
