# Compose loads this file from backend/ automatically.
#   docker compose up -d --build
#   docker compose --profile local up --build
# DotenvEnvironmentPostProcessor also loads it for mvn / IDE runs.
name: pimienta-backend

services:
  postgres:
    profiles: [local]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pimienta_alimentos}
      POSTGRES_USER: ${POSTGRES_USER:-pimienta_dba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pimienta_dba}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5431}:5432"
    volumes:
      - pimienta_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pimienta-net

  redis:
    profiles: [local]
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    ports:
      - "6378:6379"
    volumes:
      - pimienta_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pimienta-net

  # Default: API only (cloud). With --profile local: also postgres + redis.
  # CI/CD sets IMAGE=ghcr.io/<owner>/<repo>/backend:latest for pull deploys.
  api:
    image: ghcr.io/alexistrejo11/pimienta-alimentos/backend:latest
    build: .
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      SERVER_PORT: ${API_PORT:-8080}
      PIMIENTA_SECURITY_JWT_SECRET: ${PIMIENTA_SECURITY_JWT_SECRET}
      JAVA_OPTS: ${JAVA_OPTS:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_FOLDER: ${AWS_S3_FOLDER:-employees}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    networks:
      - pimienta-net

volumes:
  pimienta_pg_data:
  pimienta_redis_data:

networks:
  pimienta-net:
    external: true
