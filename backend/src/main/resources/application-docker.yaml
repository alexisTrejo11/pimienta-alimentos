# Profile: docker — use with SPRING_PROFILES_ACTIVE=docker (see docker/README.md).
# Local stack: SPRING_DATASOURCE_* / SPRING_DATA_REDIS_* set in docker-compose.local.yml.
# Cloud stack: same vars from .env via docker-compose.cloud.yml (POSTGRES_URL, REDIS_HOST).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:redis://redis:6379}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.web: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}

pimienta:
  redis:
    key-prefix: ${PIMIENTA_REDIS_KEY_PREFIX:pimienta-alimentos}
  rate-limiting:
    enabled: ${PIMIENTA_RATE_LIMITING_ENABLED:true}
  security:
    jwt:
      secret: ${PIMIENTA_SECURITY_JWT_SECRET:docker-dev-change-me-use-a-real-secret-in-production-at-least-256-bits-for-hs256}
      access-token-ttl-minutes: ${PIMIENTA_SECURITY_JWT_ACCESS_TOKEN_TTL_MINUTES:15}
      refresh-token-ttl-days: ${PIMIENTA_SECURITY_JWT_REFRESH_TOKEN_TTL_DAYS:7}
