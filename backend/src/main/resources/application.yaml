spring:
  application:
    name: pimienta
  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/pimienta_alimentos
    username: pimienta_dba
    password: pimienta_dba
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # Redis
  data:
    redis:
      host: localhost
      port: 6379
  # Server
  server:
    port: 8080
  # Logging
  logging:
    level:
      org.springframework.web: DEBUG

pimienta:
  # Redis-backed token bucket: global filter on /api/** + @RateLimit on controllers.
  rate-limiting:
    enabled: true
  # CORS — edit allowed-origins per environment (SPA dev servers, production web origin).
  cors:
    path-pattern: "/**"
    allowed-origins:
      - "http://localhost:4200"
      - "http://localhost:3000"
      - "http://127.0.0.1:4200"
      - "http://127.0.0.1:3000"
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
      - HEAD
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Type
      - X-Total-Count
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Limit-Endpoint
      - X-RateLimit-Remaining-Endpoint
      - Retry-After
    allow-credentials: true
    max-age-seconds: 3600
  security:
    jwt:
      secret: "change-me-use-at-least-256-bits-for-hs256-secret-key-pimienta"
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
