spring:
  application:
    name: pimienta
  # PostgreSQL (override via .env or OS env; see docker/README.md for Compose)
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # RDS setup uses schema pimienta (not public); keep Flyway history + DDL there too.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dialect omitted: pick from JDBC URL/driver (PostgreSQL in prod, H2 in tests).
  # Redis — set REDIS_URL only (local, Docker, Upstash, etc.)
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      repositories:
        enabled: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${API_PORT:8080}

# Actuator — only health, info, and metrics are enabled; everything else stays off.
management:
  endpoints:
    enabled-by-default: false
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      enabled: true
      show-details: when_authorized
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
  info:
    env:
      enabled: false
    java:
      enabled: true
    os:
      enabled: false
    git:
      enabled: false

info:
  app:
    name: ${spring.application.name}
    description: Pimienta Alimentos backend API

# OpenAPI / Swagger UI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
    default-model-expand-depth: 3
    default-models-expand-depth: 3
  # Logging
  logging:
    level:
      org.springframework.web: DEBUG

pimienta:
  redis:
    key-prefix: ${PIMIENTA_REDIS_KEY_PREFIX:pimienta-alimentos}
  notifications:
    admin-emails: ${PIMIENTA_NOTIFICATIONS_ADMIN_EMAILS:admin@example.com}
  image:
    max-width: 800
    max-height: 600
    quality: 0.8
    allowed-formats: jpg, jpeg, png
  # Redis-backed token bucket: global filter on /api/** + @RateLimit on controllers.
  rate-limiting:
    enabled: true
  # CORS — edit allowed-origins per environment (SPA dev servers, production web origin).
  cors:
    path-pattern: "/**"
    allowed-origins:
      - "http://localhost:4200"
      - "http://localhost:3000"
      - "http://127.0.0.1:4200"
      - "http://127.0.0.1:3000"
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
      - HEAD
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Content-Type
      - X-Total-Count
      - X-RateLimit-Limit
      - X-RateLimit-Remaining
      - X-RateLimit-Limit-Endpoint
      - X-RateLimit-Remaining-Endpoint
      - Retry-After
    allow-credentials: true
    max-age-seconds: 3600
  security:
    jwt:
      secret: ${PIMIENTA_SECURITY_JWT_SECRET:change-me-use-at-least-256-bits-for-hs256-secret-key-pimienta}
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET_NAME}
    folder: ${AWS_S3_FOLDER:employees}
    sources-root: ${AWS_S3_SOURCES_ROOT:pimienta/sources}

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.web.servlet.mvc: DEBUG
    org.springframework.web.multipart: DEBUG
    org.apache.coyote: DEBUG
