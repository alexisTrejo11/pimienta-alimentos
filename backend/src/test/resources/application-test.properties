spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
# Same key as any explicit hibernate.dialect — needed so JSON columns are not emitted as jsonb against H2.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# No Redis in tests; also avoids flaky per-endpoint throttling in integration tests.
pimienta.rate-limiting.enabled=false

# AWS (S3 beans load in tests; no real calls without photo upload + credentials)
aws.region=us-east-1
aws.s3.bucket=test-bucket
aws.s3.folder=test-employees