openapi: 3.1.0
info:
  title: Pimienta Alimentos API
  description: "REST API for Pimienta Alimentos. Most endpoints require a Bearer JWT\
    \ access token. Role claims are exposed as Spring authorities `ROLE_<NAME>` (e.g.\
    \ `ROLE_ADMIN`, `ROLE_MANAGER`)."
  contact:
    name: Pimienta Alimentos
    url: https://github.com/alexistrejo11/pimienta
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Account — Profile
  description: "Current-user profile and dashboard. Requires `Authorization: Bearer\
    \ <access_token>`. JWT must map to a valid user; roles are exposed as `ROLE_*`\
    \ authorities."
- name: Contracts
  description: "Business agreements (employment, supplier, customer, …). Requires\
    \ `Authorization: Bearer <access_token>`. Typical operators: **ADMIN**, **MANAGER**.\
    \ Related entities (employee, opportunity, project) are validated when IDs are\
    \ supplied. Domain rules may return `CONTRACT_NOT_FOUND` or validation errors\
    \ (`errorCode` in `ApiErrorResponse`)."
- name: HR — Employees
  description: "Employee lifecycle: search, registration, updates, contract submission,\
    \ termination/rehire, position changes, Excel import/export, and statistics. Requires\
    \ `Authorization: Bearer <access_token>`. Typical roles: **MANAGER**, **ADMIN**,\
    \ **HR** (as configured). Not-found responses use `EMPLOYEE_NOT_FOUND` in `ApiErrorResponse`."
- name: Authentication
  description: Registration and session endpoints. **Register** and **login** are
    public (no Bearer token). **Refresh** and **logout** are also reachable without
    an `Authorization` header in this configuration; they use the refresh token carried
    in the JSON body where applicable.
- name: Operations — Headquarters
  description: "Company sites / branches: CRUD, lookup by id or name, statistics,\
    \ and Excel import/export. Requires `Authorization: Bearer <access_token>`. Typical\
    \ roles: **ADMIN**, **MANAGER**, **OPERATIONS** (as configured). Not-found responses\
    \ use `HEADQUARTER_NOT_FOUND` in `ApiErrorResponse`."
- name: CRM — Project milestones
  description: "Milestones under a project: CRUD and lifecycle (start, complete, delayed,\
    \ cancel, billed). Requires `Authorization: Bearer <access_token>`. **404** when\
    \ project or milestone is unknown (`PROJECT_NOT_FOUND`, `PROJECT_MILESTONE_NOT_FOUND`)."
- name: Operations — Tasks
  description: "Work items: search, CRUD, status and assignment updates, checklist\
    \ toggles, and Excel import/export. Requires `Authorization: Bearer <access_token>`.\
    \ Typical roles: **MANAGER**, **ADMIN**, **SUPPORT** (as configured). Not-found\
    \ responses may use `TASK_NOT_FOUND` or `TASK_CHECKLIST_ITEM_NOT_FOUND` in `ApiErrorResponse`."
- name: Account — User management
  description: "Administrative APIs under `/api/v1/users/management`. **Requires**\
    \ `Authorization: Bearer <access_token>`. Document **elevated** roles (`ROLE_ADMIN`,\
    \ `ROLE_MANAGER`, `ROLE_SUPPORT`) for operators; fine-grained authorization may\
    \ be enforced in the application layer as the product evolves."
- name: CRM — Opportunities
  description: "Sales opportunities: search, CRUD, Excel import/export, pipeline transitions\
    \ (discovery → win/lose), and nested tasks. Requires `Authorization: Bearer <access_token>`.\
    \ Typical roles: **MANAGER**, **ADMIN**, **SUPPORT** (as configured)."
- name: CRM — Projects
  description: "Delivery projects: search, CRUD, lifecycle (activate, hold, complete,\
    \ cancel, archive), and nested tasks. Requires `Authorization: Bearer <access_token>`."
- name: Payroll
  description: Payroll management and reporting endpoints.
