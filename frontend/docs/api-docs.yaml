      type: object
      properties:
        errorCode:
          type: string
        message:
          type: string
        traceId:
          type: string
        context:
          type: object
          additionalProperties: {}
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    UpdateEmployeeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        phone:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        curp:
          type: string
          minLength: 1
        rfc:
          type: string
          minLength: 1
        nss:
          type: string
          minLength: 1
        clabe:
          type: string
          minLength: 1
        position:
          type: string
          minLength: 1
        department:
          type: string
          minLength: 1
        contractType:
          type: string
          enum:
          - INDEFINITE
          - FIXED_TERM
          - PROJECT_BASED
          - TEMPORARY
          - FREELANCE
          - UNDEFINED
        workShift:
          type: string
          enum:
          - MORNING
          - AFTERNOON
          - NIGHT
          - MIXED
          - REMOTE
          - UNDEFINED
        salaryPerWeek:
