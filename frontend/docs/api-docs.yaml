    RegisterEmployeeRequest:
      type: object
      description: Payload to register a new employee in onboarding (draft or pending
        employment contract).
      properties:
        name:
          type: string
          description: Full legal name.
          example: María López García
          minLength: 1
        email:
          type: string
          format: email
          description: Work email address.
          example: maria.lopez@empresa.example
          minLength: 1
        phone:
          type: string
          description: Contact phone number.
          example: +52 55 1234 5678
          minLength: 1
        address:
          type: string
          description: Street address.
          example: "Av. Reforma 123, CDMX"
          minLength: 1
        curp:
          type: string
          description: CURP (18 characters).
          example: XXXX850101HDFXXX09
          maxLength: 18
          minLength: 18
        rfc:
          type: string
          description: RFC (12 or 13 characters).
          example: XAXX010101000
          maxLength: 13
          minLength: 12
        nss:
          type: string
          description: IMSS NSS (11 digits).
          example: "12345678901"
          minLength: 1
        clabe:
          type: string
          description: 18-digit CLABE for payroll deposits.
          example: "012180001234567890"
          minLength: 1
        employeeNumber:
          type: string
          description: Internal employee number.
          example: EMP-1042
          minLength: 1
        position:
          type: string
          description: Job title or position.
          example: Operador de línea
          minLength: 1
        department:
          type: string
          description: Department or area.
          example: Producción
          minLength: 1
        contractType:
          type: string
          description: Employment contract type.
          enum:
          - INDEFINITE
          - FIXED_TERM
          - PROJECT_BASED
          - TEMPORARY
          - FREELANCE
          - UNDEFINED
        workShift:
          type: string
          description: Work shift.
          enum:
          - MORNING
          - AFTERNOON
          - NIGHT
          - MIXED
          - REMOTE
          - UNDEFINED
        salaryPerWeek:
          type: number
          description: Gross weekly salary in MXN.
          example: 3500.0
          minimum: 0
        birthDate:
          type: string
          format: date
          description: Date of birth (ISO-8601 date).
          example: 1985-01-01
        onboardingPhase:
          type: string
          description: "Onboarding phase: DRAFT (still being captured) or PENDING_CONTRACT\
            \ (awaiting contract)."
          enum:
          - DRAFT
          - PENDING_CONTRACT
      required:
      - address
      - birthDate
      - clabe
      - contractType
      - curp
      - department
      - email
      - employeeNumber
      - name
      - nss
      - onboardingPhase
      - phone
      - position
      - rfc
      - salaryPerWeek
      - workShift
    CreateContractRequest:
      type: object
      description: "Cuerpo para registrar un contrato. **EMPLOYEE** exige `employeeId`.\
        \ **FIXED_TERM** exige `effectiveEnd` posterior a `effectiveStart`. **INDEFINITE**\
        \ no debe enviar `effectiveEnd`. Si se envía `agreedValue`, `currencyCode`\
        \ debe ser ISO 4217 de 3 letras (p. ej. MXN)."
      properties:
        name:
          type: string
          description: Nombre o título del contrato (visible en listados).
          example: Contrato suministro materias primas 2025
          minLength: 1
        description:
          type: string
          description: Descripción libre; puede omitirse (se interpreta como vacío).
          example: Acuerdo marco con proveedor homologado.
        category:
          type: string
          description: "Tipo de contrato según la contraparte: EMPLOYEE, SUPPLIER,\
            \ CUSTOMER, PARTNER, OTHER."
          enum:
          - EMPLOYEE
          - SUPPLIER
          - CUSTOMER
          - PARTNER
          - OTHER
          - UNDEFINED
          example: SUPPLIER
        employeeId:
          type: integer
          format: int64
          description: Identificador del empleado; **obligatorio** si `category` es
            EMPLOYEE; debe omitirse en otros tipos.
          example: 101
        opportunityId:
          type: integer
          format: int64
          description: Oportunidad CRM vinculada (opcional). Debe existir si se envía.
          example: 5001
        projectId:
          type: integer
          format: int64
          description: Proyecto vinculado (opcional). Debe existir si se envía.
          example: 88
        termKind:
          type: string
          description: "Plazo: FIXED_TERM (con fin) o INDEFINITE (sin fecha de té\
            rmino en sistema)."
          enum:
          - FIXED_TERM
          - INDEFINITE
          - UNDEFINED
          example: FIXED_TERM
        effectiveStart:
          type: string
          format: date
          description: Inicio de vigencia (ISO-8601 date).
          example: 2025-05-01
        effectiveEnd:
          type: string
          format: date
          description: Fin de vigencia obligatorio para FIXED_TERM; no debe enviarse
            para INDEFINITE.
          example: 2026-04-30
        documentUrl:
          type: string
          description: URL del documento firmado o archivo archivado (obligatorio
            en esta API).
          example: https://storage.example.com/contracts/sup-2025-001.pdf
          minLength: 1
        termsAndConditions:
          type: string
          description: Texto de términos y condiciones (opcional).
          example: Pago a 30 días; incumplimiento según legislación aplicable.
        referenceCode:
          type: string
          description: Código interno o folio de referencia (opcional).
          example: CT-SUP-2025-042
        renewalCycleMonths:
          type: integer
          format: int32
          description: Meses para renovación automática (`POST .../renew`); solo aplica
            a FIXED_TERM con ciclo definido.
          example: 12
          minimum: 1
        agreedValue:
          type: number
          description: "Valor pactado (opcional). Si se envía, usar también `currencyCode`."
          example: 250000.0
          minimum: 0
        currencyCode:
          type: string
          description: "Código de moneda ISO 4217 (3 letras), obligatorio si hay `agreedValue`."
          example: MXN
          maxLength: 3
          minLength: 3
      required:
      - category
      - documentUrl
      - effectiveStart
      - name
      - termKind
