        **UNDEFINED** si faltan en almacenamiento legado.
      properties:
        id:
          type: integer
          format: int64
          description: Identificador persistido; 0 o ausente antes de guardar en borradores.
          example: 42
        name:
          type: string
          description: Nombre o título del contrato.
          example: Contrato suministro 2025
        description:
          type: string
          description: Descripción.
          example: Acuerdo marco con proveedor homologado.
        category:
          type: string
          description: "Categoría: EMPLOYEE, SUPPLIER, CUSTOMER, PARTNER, OTHER, o\
            \ UNDEFINED si no hay dato."
          enum:
          - EMPLOYEE
          - SUPPLIER
          - CUSTOMER
          - PARTNER
          - OTHER
          - UNDEFINED
          example: SUPPLIER
        employeeId:
          type: integer
          format: int64
          description: Empleado vinculado (solo EMPLOYEE).
          example: 101
        opportunityId:
          type: integer
          format: int64
          description: Oportunidad CRM.
          example: 5001
        projectId:
          type: integer
          format: int64
          description: Proyecto.
          example: 88
        termKind:
          type: string
          description: "Tipo de plazo: FIXED_TERM, INDEFINITE, o UNDEFINED si no hay\
            \ dato."
          enum:
          - FIXED_TERM
          - INDEFINITE
          - UNDEFINED
          example: FIXED_TERM
        effectiveStart:
          type: string
          format: date
          description: Inicio de vigencia.
          example: 2025-05-01
        effectiveEnd:
          type: string
          format: date
          description: Fin de vigencia (null si indefinido o sin fin en modelo).
          example: 2026-04-30
        documentUrl:
          type: string
          description: URL del documento firmado o archivo.
          example: https://storage.example.com/contracts/sup-2025-001.pdf
        termsAndConditions:
          type: string
          description: Términos y condiciones.
          example: Pago a 30 días.
        referenceCode:
          type: string
          description: Código de referencia.
          example: CT-SUP-2025-042
        agreedValue:
          type: number
          description: Valor pactado (puede ser null).
          example: 250000.0
        currencyCode:
          type: string
          description: Moneda ISO 4217; cadena vacía si no aplica.
          example: MXN
        renewalCycleMonths:
          type: integer
          format: int32
          description: Meses de ciclo para renovación automática.
          example: 12
          minimum: 1
        extensionCount:
          type: integer
          format: int32
          description: Número de renovaciones o prórrogas registradas.
          example: 2
          minimum: 0
        lastRenewedAt:
          type: string
          format: date-time
          description: Marca de tiempo de la última renovación o extensión.
