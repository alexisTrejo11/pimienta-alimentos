components:
  schemas:
    StorageLocationUpdateRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum:
          - WAREHOUSE
          - ZONE
          - AISLE
          - SHELF
          - BIN
        parentId:
          type: integer
          format: int64
        maxCapacity:
          type: integer
          format: int32
          minimum: 0
        occupiedCapacity:
          type: integer
          format: int32
          minimum: 0
        status:
          type: string
          enum:
          - ACTIVE
          - FULL
          - BLOCKED
          - INACTIVE
      required:
      - code
      - name
      - status
      - type
    StorageLocationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
          - WAREHOUSE
          - ZONE
          - AISLE
          - SHELF
          - BIN
        parentId:
          type: integer
          format: int64
        maxCapacity:
          type: integer
          format: int32
        occupiedCapacity:
          type: integer
          format: int32
        status:
          type: string
          enum:
          - ACTIVE
          - FULL
          - BLOCKED
          - INACTIVE
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    ItemUpdateRequest:
      type: object
      properties:
        sku:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        category:
          type: string
          enum:
          - RAW_MATERIAL
          - FINISHED_GOOD
          - CONSUMABLE
          - SPARE_PART
          - PACKAGING
          - TOOL
          - MACHINE
          - FURNITURE
          - OTHER
        unit:
          type: string
          enum:
          - PIECE
          - KG
          - GRAM
          - LITER
          - ML
          - BOX
          - DOZEN
          - METER
          - SQUARE_METER
        reorderPoint:
          type: integer
          format: int32
          minimum: 0
        reorderQuantity:
          type: integer
          format: int32
          minimum: 0
        brand:
          type: string
        barcode:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - DISCONTINUED
          - OUT_OF_STOCK
          - PENDING_APPROVAL
      required:
      - category
      - costPrice
      - name
      - salePrice
      - sku
      - status
      - unit
    ItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum:
          - RAW_MATERIAL
          - FINISHED_GOOD
          - CONSUMABLE
          - SPARE_PART
          - PACKAGING
          - TOOL
          - MACHINE
          - FURNITURE
          - OTHER
        unit:
          type: string
          enum:
          - PIECE
          - KG
          - GRAM
          - LITER
          - ML
          - BOX
          - DOZEN
          - METER
          - SQUARE_METER
        brand:
          type: string
        barcode:
          type: string
        costPrice:
          type: number
        salePrice:
          type: number
        reorderPoint:
          type: integer
          format: int32
        reorderQuantity:
          type: integer
          format: int32
        status:
          type: string
          enum:
          - ACTIVE
          - DISCONTINUED
          - OUT_OF_STOCK
          - PENDING_APPROVAL
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    HeadQuarterRequest:
      type: object
      description: JSON body for create or update. **address** and **description**
        are optional (null or empty strings are normalized in the application/domain
        layers).
      properties:
        name:
          type: string
          description: Display name or unique key for the site.
          example: North Plant — Monterrey
          minLength: 1
        address:
          type: string
          description: Street or location (optional).
          example: "1200 Industrial Ave, Industrial Park"
        description:
          type: string
          description: Extended notes (optional).
          example: Raw materials receiving; 06:00–22:00.
      required:
      - name
    HeadQuarterResponse:
      type: object
      description: Headquarter representation. Text fields may be empty strings when
        absent in storage; **deletedAt** indicates soft delete.
      properties:
        id:
          type: integer
          format: int64
          description: Persisted id.
          example: 1
        name:
          type: string
          description: Site name.
          example: North Plant — Monterrey
        address:
          type: string
          description: Address.
          example: 1200 Industrial Ave
        description:
          type: string
          description: Description.
          example: Raw materials receiving.
        createdAt:
          type: string
          format: date-time
          description: Created at (audit).
        updatedAt:
          type: string
          format: date-time
          description: Last update (audit).
        deletedAt:
          type: string
          format: date-time
          description: Soft-delete timestamp; null when active.
        version:
          type: integer
          format: int64
          description: Optimistic lock version (JPA @Version).
          example: 3
