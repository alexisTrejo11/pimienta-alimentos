        vacationPremiumPercent:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateContractRequest:
      type: object
      description: "Misma forma y reglas que el alta (**CreateContractRequest**):\
        \ actualización completa del estado expuesto por la API. Requiere `Authorization:\
        \ Bearer <token>`."
      properties:
        name:
          type: string
          description: Nombre o título del contrato.
          example: Contrato suministro materias primas 2025 (enmienda 1)
          minLength: 1
        description:
          type: string
          description: Descripción libre; puede omitirse.
          example: Acuerdo marco con proveedor homologado — anexo logística.
        category:
          type: string
          description: "Tipo de contrato: EMPLOYEE, SUPPLIER, CUSTOMER, PARTNER, OTHER."
          enum:
          - EMPLOYEE
          - SUPPLIER
          - CUSTOMER
          - PARTNER
          - OTHER
          - UNDEFINED
          example: SUPPLIER
        employeeId:
          type: integer
          format: int64
          description: Empleado vinculado; obligatorio si `category` es EMPLOYEE.
          example: 101
        opportunityId:
          type: integer
          format: int64
          description: Oportunidad CRM (opcional).
          example: 5001
        projectId:
          type: integer
          format: int64
          description: Proyecto (opcional).
          example: 88
        termKind:
          type: string
          description: "Plazo: FIXED_TERM o INDEFINITE."
          enum:
          - FIXED_TERM
          - INDEFINITE
          - UNDEFINED
          example: FIXED_TERM
        effectiveStart:
          type: string
          format: date
          description: Inicio de vigencia (ISO-8601 date).
          example: 2025-05-01
        effectiveEnd:
          type: string
          format: date
          description: Fin de vigencia (FIXED_TERM); omitir en INDEFINITE.
          example: 2026-10-31
        documentUrl:
          type: string
          description: URL del documento firmado o archivo archivado.
          example: https://storage.example.com/contracts/sup-2025-001-v2.pdf
          minLength: 1
        termsAndConditions:
          type: string
          description: Términos y condiciones (opcional).
          example: Pago a 45 días a partir de recepción de factura.
        referenceCode:
          type: string
          description: Código de referencia (opcional).
          example: CT-SUP-2025-042-R1
        renewalCycleMonths:
          type: integer
          format: int32
          description: Meses entre renovaciones automáticas (FIXED_TERM).
          example: 12
          minimum: 1
        agreedValue:
          type: number
          description: Valor pactado (opcional).
          example: 275000.0
          minimum: 0
        currencyCode:
