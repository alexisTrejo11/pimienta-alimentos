        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        birthDate:
          type: string
          format: date
        nationality:
          type: string
        curp:
          type: string
        rfc:
          type: string
        nss:
          type: string
        clabe:
          type: string
        employeeNumber:
          type: string
        position:
          type: string
        department:
          type: string
        contractType:
          type: string
          enum:
          - INDEFINITE
          - FIXED_TERM
          - PROJECT_BASED
          - TEMPORARY
          - FREELANCE
          - UNDEFINED
        workShift:
          type: string
          enum:
          - MORNING
          - AFTERNOON
          - NIGHT
          - MIXED
          - REMOTE
          - UNDEFINED
        hireDate:
          type: string
          format: date
        terminationDate:
          type: string
          format: date
        status:
          type: string
          enum:
          - DRAFT
          - PENDING_CONTRACT
          - ACTIVE
          - SICK
          - ON_VACATION
          - ON_LEAVE
          - TERMINATED
          - FIRED
          - RESIGNED
          - UNDEFINED
        salaryPerWeek:
          type: number
        bonuses:
          type: number
        foodVouchers:
          type: number
        integrationFactor:
          type: number
        imssWorkerType:
          type: string
          enum:
          - PERMANENT_URBAN
          - EVENTUAL_URBAN
          - PERMANENT_RURAL
          - EVENTUAL_RURAL
        imssSalaryType:
          type: string
          enum:
          - FIXED
          - VARIABLE
          - MIXED
        christmasBonusDays:
          type: integer
          format: int32
        vacationDays:
          type: integer
