<td class="px-4 py-3">
  <div class="flex items-center gap-3">
    <span
      class="material-symbols-outlined text-2xl text-[var(--color-primary)]"
      aria-hidden="true"
    >{{ fileIcon(archivo().contentType) }}</span>
    <div class="min-w-0">
      <div class="truncate font-semibold text-on-surface" [title]="archivo().originalName">
        {{ archivo().originalName }}
      </div>
      @if (archivo().description) {
        <div class="truncate text-xs text-on-surface-variant" [title]="archivo().description!">
          {{ archivo().description }}
        </div>
      }
    </div>
  </div>
</td>

<td class="px-4 py-3 text-on-surface-variant">
  {{ categoryLabel(archivo().category) }}
</td>

<td class="px-4 py-3 text-xs text-on-surface-variant">
  {{ archivo().contentType }}
</td>

<td class="px-4 py-3 tabular-nums text-on-surface-variant">
  {{ formatBytes(archivo().fileSizeBytes) }}
</td>

<td class="px-4 py-3 text-on-surface-variant">
  {{ formatDate(archivo().createdAt) }}
</td>

<td class="px-4 py-3 text-right">
  <div class="inline-flex items-center gap-2">
    <button
      type="button"
      class="inline-flex items-center gap-1 rounded-lg border border-stone-200 px-3 py-1.5 text-xs font-semibold text-on-surface transition hover:bg-stone-100 disabled:cursor-not-allowed disabled:opacity-60 dark:border-stone-700 dark:hover:bg-stone-800"
      [disabled]="downloading()"
      (click)="onDownload()"
      [attr.aria-label]="'Descargar ' + archivo().originalName"
    >
      @if (downloading()) {
        <span>…</span>
      } @else {
        <span class="material-symbols-outlined text-sm" aria-hidden="true">download</span>
        Descargar
      }
    </button>
    @if (canDelete()) {
      <button
        type="button"
        class="inline-flex items-center gap-1 rounded-lg border border-red-200 px-3 py-1.5 text-xs font-semibold text-red-700 transition hover:bg-red-50 disabled:opacity-60 dark:border-red-900/50 dark:text-red-400 dark:hover:bg-red-950/30"
        (click)="onDelete()"
        [attr.aria-label]="'Eliminar ' + archivo().originalName"
      >
        <span class="material-symbols-outlined text-sm" aria-hidden="true">delete</span>
        Eliminar
      </button>
    }
  </div>
</td>
