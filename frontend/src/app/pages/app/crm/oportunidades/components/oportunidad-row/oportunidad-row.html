<td class="px-4 py-3">
  <div class="font-semibold text-on-surface">{{ oportunidad().title }}</div>
  <div class="text-xs text-on-surface-variant">{{ oportunidad().contactName }}</div>
</td>

<td class="px-4 py-3 text-on-surface-variant">{{ oportunidad().companyName }}</td>

<td class="px-4 py-3">
  <app-status-badge [status]="oportunidad().status" kind="opportunity" />
</td>

<td class="px-4 py-3 text-right font-mono text-on-surface">
  {{ formatMXN(oportunidad().estimatedValue) }}
</td>

<td class="px-4 py-3 text-on-surface-variant">
  {{ formatDate(oportunidad().expectedCloseDate) }}
</td>

<td class="px-4 py-3 text-right">
  <a
    [routerLink]="['/app/crm/oportunidades', oportunidad().id]"
    class="inline-flex items-center gap-1 rounded-lg border border-stone-200 px-3 py-1.5 text-xs font-semibold text-on-surface transition hover:bg-stone-100 dark:border-stone-700 dark:hover:bg-stone-800"
  >
    Ver <span class="material-symbols-outlined text-sm" aria-hidden="true">chevron_right</span>
  </a>
</td>
