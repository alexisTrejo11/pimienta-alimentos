<div class="flex flex-col gap-6 p-8">

  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <app-page-header
      title="Proyectos"
      subtitle="Proyectos formales generados a partir de oportunidades ganadas"
    />
    <a
      routerLink="/app/crm/proyectos/nuevo"
      class="inline-flex shrink-0 items-center justify-center rounded-lg bg-primary px-4 py-2.5 text-sm font-bold text-on-primary shadow-md transition hover:opacity-95"
    >
      Nuevo proyecto
    </a>
  </div>

  <app-data-state
    [loading]="loading()"
    [error]="error()"
    [empty]="proyectos().length === 0"
    emptyMessage="No hay proyectos registrados."
    (retry)="cargar()"
  >
    <div class="overflow-x-auto rounded-xl border border-stone-200 bg-white dark:border-stone-800 dark:bg-stone-950">
      <table class="w-full text-sm" aria-label="Lista de proyectos">
        <thead class="border-b border-stone-100 bg-stone-50 dark:border-stone-800 dark:bg-stone-900">
          <tr>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Código</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Nombre</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Estado</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Prioridad</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Progreso</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Fin planeado</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-stone-100 dark:divide-stone-800">
          @for (proyecto of proyectos(); track proyecto.id) {
            <tr app-proyecto-row [proyecto]="proyecto"></tr>
          }
        </tbody>
      </table>
    </div>
  </app-data-state>

</div>
