<div class="flex flex-col gap-6 p-8">

  <app-page-header
    title="Sedes"
    subtitle="Ubicaciones físicas de la empresa"
  />

  <!-- Estadísticas de sedes -->
  @if (stats(); as s) {
    <div class="grid grid-cols-3 gap-4">
      <div class="rounded-xl border border-stone-200 bg-white p-4 dark:border-stone-800 dark:bg-stone-950">
        <p class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Total</p>
        <p class="font-headline mt-1 text-3xl font-bold tabular-nums text-on-surface">{{ s.total }}</p>
      </div>
      <div class="rounded-xl border border-green-200 bg-green-50 p-4 dark:border-green-900/40 dark:bg-green-950/30">
        <p class="text-xs font-medium uppercase tracking-wide text-green-700 dark:text-green-400">Activas</p>
        <p class="font-headline mt-1 text-3xl font-bold tabular-nums text-green-800 dark:text-green-300">{{ s.active }}</p>
      </div>
      <div class="rounded-xl border border-stone-200 bg-stone-50 p-4 dark:border-stone-800 dark:bg-stone-900">
        <p class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Dadas de baja</p>
        <p class="font-headline mt-1 text-3xl font-bold tabular-nums text-on-surface">{{ s.softDeleted }}</p>
      </div>
    </div>
  }

  <!-- Grid de tarjetas de sedes -->
  <app-data-state
    [loading]="loading()"
    [error]="error()"
    [empty]="sedes().length === 0"
    emptyMessage="No hay sedes registradas."
    (retry)="cargar()"
  >
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (sede of sedes(); track sede.id) {
        <app-sede-card [sede]="sede" />
      }
    </div>
  </app-data-state>

</div>
