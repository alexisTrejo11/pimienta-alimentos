<!-- Tarjeta de métricas clave de la oportunidad -->
<section class="rounded-xl border border-stone-200 bg-white p-6 dark:border-stone-800 dark:bg-stone-950" aria-label="Resumen de la oportunidad">
  <h2 class="font-headline mb-4 text-base font-bold text-on-surface">Resumen</h2>

  <div class="grid grid-cols-2 gap-4 sm:grid-cols-4">

    <div>
      <p class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Tareas totales</p>
      <p class="font-headline mt-1 text-2xl font-bold tabular-nums text-on-surface">{{ summary().taskCount }}</p>
    </div>

    <div>
      <p class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Tareas abiertas</p>
      <p class="font-headline mt-1 text-2xl font-bold tabular-nums text-on-surface">{{ summary().openTaskCount }}</p>
    </div>

    <div>
      <p class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Valor ponderado</p>
      <p class="font-headline mt-1 text-2xl font-bold tabular-nums text-on-surface">{{ formatMXN(summary().weightedValue) }}</p>
    </div>

    <div>
      <p class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">¿Vencida?</p>
      @if (summary().overdue) {
        <span class="mt-1 inline-flex items-center gap-1 rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-semibold text-red-800">
          <span class="material-symbols-outlined text-sm" aria-hidden="true">warning</span>
          Sí, vencida
        </span>
      } @else {
        <span class="mt-1 inline-flex items-center rounded-full bg-green-100 px-2.5 py-0.5 text-xs font-semibold text-green-800">
          Al corriente
        </span>
      }
    </div>

  </div>
</section>
