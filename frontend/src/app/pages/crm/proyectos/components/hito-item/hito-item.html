<!-- Fila de hito: orden, nombre, estado, fechas, monto y si ya se facturó -->
<div class="flex flex-col gap-1 rounded-lg border border-stone-100 p-4 dark:border-stone-800 sm:flex-row sm:items-center sm:justify-between">

  <!-- Número de orden e información principal -->
  <div class="flex items-start gap-3">
    <span class="font-headline mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-stone-100 text-xs font-bold text-on-surface-variant dark:bg-stone-800">
      {{ hito().sortOrder }}
    </span>
    <div>
      <p class="font-semibold text-on-surface">{{ hito().name }}</p>
      @if (hito().description) {
        <p class="mt-0.5 text-xs text-on-surface-variant">{{ hito().description }}</p>
      }
    </div>
  </div>

  <!-- Metadatos: estado, fecha, monto, facturado -->
  <div class="ml-9 flex flex-wrap items-center gap-3 sm:ml-0">
    <app-status-badge [status]="hito().status" kind="milestone" />

    <span class="text-xs text-on-surface-variant">
      {{ formatDate(hito().plannedDate) }}
    </span>

    <span class="font-mono text-xs font-semibold text-on-surface">
      {{ formatMXN(hito().billingAmount) }}
    </span>

    <!-- Indicador visual de si el hito ya fue facturado -->
    @if (hito().billed) {
      <span class="inline-flex items-center gap-1 rounded-full bg-green-100 px-2 py-0.5 text-xs font-semibold text-green-800">
        <span class="material-symbols-outlined text-sm" aria-hidden="true">check_circle</span>
        Facturado
      </span>
    } @else {
      <span class="inline-flex items-center rounded-full bg-stone-100 px-2 py-0.5 text-xs text-stone-500 dark:bg-stone-800">
        Sin facturar
      </span>
    }
  </div>

</div>
