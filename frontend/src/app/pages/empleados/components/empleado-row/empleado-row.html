<!-- Fila de empleado en la tabla de listado. Cada celda corresponde a una columna del <thead>. -->
<td class="px-4 py-3 font-mono text-xs text-on-surface-variant">{{ empleado().id }}</td>

<td class="px-4 py-3">
  <div class="flex items-center gap-3">
    <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-stone-200 text-xs font-bold uppercase text-stone-600 dark:bg-stone-700 dark:text-stone-300">
      {{ empleado().firstName.charAt(0) }}{{ empleado().lastName.charAt(0) }}
    </div>
    <div>
      <div class="font-semibold text-on-surface">{{ empleado().firstName }} {{ empleado().lastName }}</div>
      <div class="text-xs text-on-surface-variant">{{ empleado().email }}</div>
    </div>
  </div>
</td>

<td class="px-4 py-3 text-on-surface-variant">{{ empleado().department || '—' }}</td>

<td class="px-4 py-3 text-on-surface">{{ empleado().position || '—' }}</td>

<td class="px-4 py-3">
  <app-status-badge [status]="empleado().status" kind="employee" />
</td>

<td class="px-4 py-3 text-on-surface-variant">{{ formatDate(empleado().hireDate || '') }}</td>

<!-- Enlace al detalle del empleado -->
<td class="px-4 py-3 text-right">
  <a
    [routerLink]="['/app/empleados', empleado().id]"
    class="inline-flex items-center gap-1 rounded-lg border border-stone-200 px-3 py-1.5 text-xs font-semibold text-on-surface transition hover:bg-stone-100 dark:border-stone-700 dark:hover:bg-stone-800"
    aria-label="Ver detalle del empleado"
  >
    Ver
    <span class="material-symbols-outlined text-sm" aria-hidden="true">chevron_right</span>
  </a>
</td>
