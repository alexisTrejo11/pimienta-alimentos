<nav
  class="fixed left-0 right-0 top-0 z-50 border-b border-stone-200/60 bg-white/80 shadow-[0_1px_2px_rgba(28,25,23,0.05)] backdrop-blur-md dark:border-stone-800/60 dark:bg-stone-950/80 dark:shadow-[0_1px_3px_rgba(0,0,0,0.3)]"
  aria-label="Principal"
>
  <div
    class="mx-auto flex max-w-[80rem] items-center justify-between gap-4 px-8 py-4"
  >
    <div class="flex items-center gap-3">
      <a
        class="flex items-center gap-3 text-inherit no-underline"
        routerLink="/"
        fragment="inicio"
      >
        <img
          class="h-10 w-auto"
          [src]="logoUrl"
          width="160"
          height="40"
          alt="Pimienta Alimentos"
        />
        <span
          class="font-headline text-xl font-extrabold tracking-tight text-red-700 dark:text-red-400"
          >Pimienta Alimentos</span
        >
      </a>
    </div>
    <div class="hidden items-center gap-8 md:flex">
      <a [routerLink]="['/']" fragment="inicio" [class]="navLinkClass('inicio')"
        >Inicio</a
      >
      <a
        [routerLink]="['/']"
        fragment="nosotros"
        [class]="navLinkClass('nosotros')"
        >Nosotros</a
      >
      <a
        [routerLink]="['/']"
        fragment="historia"
        [class]="navLinkClass('historia')"
        >Historia</a
      >
      <a
        [routerLink]="['/']"
        fragment="filosofia"
        [class]="navLinkClass('filosofia')"
        >Filosofía</a
      >
      <a
        [routerLink]="['/']"
        fragment="contacto"
        [class]="navLinkClass('contacto')"
        >Contacto</a
      >
    </div>
    <div>
      <a
        routerLink="/app"
        class="font-headline inline-flex scale-95 items-center justify-center rounded-lg bg-primary px-6 py-2 text-sm font-bold text-on-primary no-underline transition hover:brightness-105"
        >Portal Trabajadores</a
      >
    </div>
  </div>
</nav>
