<td class="px-4 py-3">
  <p class="font-semibold text-on-surface">{{ tarea().title }}</p>
</td>

<td class="px-4 py-3">
  <app-status-badge [status]="tarea().status" kind="task" />
</td>

<td class="px-4 py-3 text-sm" [class]="prioridadColor">
  {{ prioridadLabel }}
</td>

<!-- Mini barra de progreso del checklist -->
<td class="px-4 py-3">
  <div class="flex items-center gap-2">
    <div class="h-1.5 w-16 overflow-hidden rounded-full bg-stone-200 dark:bg-stone-700">
      <div
        class="h-full rounded-full bg-primary transition-all"
        [style.width.%]="tarea().progressPercent"
      ></div>
    </div>
    <span class="text-xs tabular-nums text-on-surface-variant">{{ tarea().progressPercent }}%</span>
  </div>
</td>

<td class="px-4 py-3 text-on-surface-variant">{{ formatDate(tarea().dueDate) }}</td>

<td class="px-4 py-3 text-right">
  <a
    [routerLink]="['/app/tareas', tarea().id]"
    class="inline-flex items-center gap-1 rounded-lg border border-stone-200 px-3 py-1.5 text-xs font-semibold text-on-surface transition hover:bg-stone-100 dark:border-stone-700 dark:hover:bg-stone-800"
  >
    Ver <span class="material-symbols-outlined text-sm" aria-hidden="true">chevron_right</span>
  </a>
</td>
