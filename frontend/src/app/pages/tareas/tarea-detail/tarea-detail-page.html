<div class="flex flex-col gap-6 p-8">

  <app-page-header
    [title]="tarea()?.title ?? 'Detalle de tarea'"
    backLink="/app/tareas"
    backLabel="Tareas"
  />

  <app-data-state
    [loading]="loading()"
    [error]="error()"
    [empty]="!tarea()"
    emptyMessage="No se encontró la tarea."
  >
    @if (tarea(); as t) {
      <div class="flex flex-col gap-6">

        <!-- Información general -->
        <section class="rounded-xl border border-stone-200 bg-white p-6 dark:border-stone-800 dark:bg-stone-950">
          <div class="mb-4 flex flex-wrap items-center gap-3">
            <app-status-badge [status]="t.status" kind="task" />
            <span class="text-sm text-on-surface-variant">Prioridad: {{ prioridadLabel }}</span>
          </div>

          @if (t.description) {
            <p class="mb-4 text-on-surface">{{ t.description }}</p>
          }

          <dl class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
              <dt class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Fecha límite</dt>
              <dd class="mt-1 text-on-surface">{{ formatDate(t.dueDate) }}</dd>
            </div>
            <div>
              <dt class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Fecha de completado</dt>
              <dd class="mt-1 text-on-surface">{{ formatDate(t.completedAt) }}</dd>
            </div>
            <div>
              <dt class="text-xs font-medium uppercase tracking-wide text-on-surface-variant">Progreso del checklist</dt>
              <dd class="mt-1 flex items-center gap-2">
                <div class="h-2 w-24 overflow-hidden rounded-full bg-stone-200 dark:bg-stone-700">
                  <div class="h-full rounded-full bg-primary transition-all" [style.width.%]="t.progressPercent"></div>
                </div>
                <span class="text-sm tabular-nums text-on-surface">{{ t.progressPercent }}%</span>
              </dd>
            </div>
          </dl>
        </section>

        <!-- Checklist como componente reutilizable -->
        <app-checklist-section [items]="t.checklist" />

      </div>
    }
  </app-data-state>

</div>
