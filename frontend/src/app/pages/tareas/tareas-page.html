<div class="flex flex-col gap-6 p-8">

  <app-page-header
    title="Tareas"
    subtitle="Seguimiento de tareas personales y de trabajo"
  />

  <app-data-state
    [loading]="loading()"
    [error]="error()"
    [empty]="tareas().length === 0"
    emptyMessage="No hay tareas registradas."
    (retry)="cargar()"
  >
    <div class="overflow-x-auto rounded-xl border border-stone-200 bg-white dark:border-stone-800 dark:bg-stone-950">
      <table class="w-full text-sm" aria-label="Lista de tareas">
        <thead class="border-b border-stone-100 bg-stone-50 dark:border-stone-800 dark:bg-stone-900">
          <tr>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Título</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Estado</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Prioridad</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Progreso</th>
            <th class="px-4 py-3 text-left font-semibold text-on-surface-variant">Vencimiento</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-stone-100 dark:divide-stone-800">
          @for (tarea of tareas(); track tarea.id) {
            <tr app-tarea-row [tarea]="tarea"></tr>
          }
        </tbody>
      </table>
    </div>
  </app-data-state>

</div>
