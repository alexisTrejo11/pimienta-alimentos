<!-- Estado 1: cargando -->
@if (loading()) {
  <div class="flex items-center gap-3 py-16 text-on-surface-variant" role="status" aria-live="polite">
    <!-- Spinner de carga simple usando animación CSS de Tailwind -->
    <span
      class="inline-block h-5 w-5 animate-spin rounded-full border-2 border-current border-t-transparent"
      aria-hidden="true"
    ></span>
    <span class="text-sm">Cargando información…</span>
  </div>
}

<!-- Estado 2: error -->
@else if (error(); as err) {
  <div
    class="rounded-xl border border-red-200 bg-red-50 p-5 dark:border-red-900/50 dark:bg-red-950/40"
    role="alert"
  >
    <p class="font-semibold text-red-900 dark:text-red-100">No se pudo cargar la información</p>
    <p class="mt-1 text-sm text-red-800 opacity-90 dark:text-red-200">{{ err.message }}</p>
    <button
      type="button"
      class="mt-3 rounded-lg bg-red-700 px-4 py-2 text-sm font-medium text-white hover:bg-red-800 active:scale-[0.98]"
      (click)="retry.emit()"
    >
      Reintentar
    </button>
  </div>
}

<!-- Estado 3: sin datos -->
@else if (empty()) {
  <div class="flex flex-col items-center gap-3 py-16 text-center text-on-surface-variant">
    <span class="material-symbols-outlined text-5xl opacity-30" aria-hidden="true">inbox</span>
    <p class="text-sm">{{ emptyMessage() }}</p>
  </div>
}

<!-- Estado 4: contenido real (ng-content proyecta lo que el padre pase) -->
@else {
  <ng-content />
}
