<!-- Encabezado de página: enlace de regreso (opcional) + título + subtítulo (opcional). -->
<header class="flex flex-col gap-1">
  @if (backLink()) {
    <!-- Enlace de regreso; solo se muestra cuando se pasa backLink -->
    <a
      [routerLink]="backLink()"
      class="mb-1 inline-flex w-fit items-center gap-1 text-sm font-medium text-stone-500 transition hover:text-on-surface"
      aria-label="Regresar a la lista"
    >
      <span class="material-symbols-outlined text-base" aria-hidden="true">arrow_back</span>
      {{ backLabel() }}
    </a>
  }

  <h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">
    {{ title() }}
  </h1>

  @if (subtitle()) {
    <p class="text-sm text-on-surface-variant">{{ subtitle() }}</p>
  }
</header>
