<aside
  class="fixed left-0 top-0 z-50 flex h-full w-64 flex-col border-r border-stone-200/15 bg-stone-50 px-4 py-6 shadow-xl shadow-stone-900/5 dark:border-stone-800/15 dark:bg-stone-950"
  aria-label="Panel de navegación"
>
  <!-- Logo y nombre de la empresa -->
  <div class="mb-8 flex items-center gap-3 px-2">
    <img
      class="h-10 w-10 rounded-lg object-contain"
      [src]="logoUrl"
      width="40"
      height="40"
      alt="Pimienta Alimentos"
    />
    <div>
      <p class="font-headline text-xl font-extrabold leading-tight tracking-tighter text-red-700 dark:text-red-500">
        Pimienta Alimentos
      </p>
      <p class="font-headline text-[10px] font-bold uppercase tracking-tight text-stone-500">
        Precision Kitchen Management
      </p>
    </div>
  </div>

  <!-- Navegación principal -->
  <nav class="flex flex-grow flex-col space-y-1 overflow-y-auto" aria-label="Secciones">

    <!-- Dashboard -->
    <a
      routerLink="/app/dashboard"
      routerLinkActive="bg-red-50 font-semibold text-red-700 border-r-4 border-red-700 dark:bg-red-950/30 dark:text-red-500 dark:border-red-500"
      [routerLinkActiveOptions]="{ exact: true }"
      [class]="navLinkInactive"
    >
      <span class="material-symbols-outlined" aria-hidden="true">dashboard</span>
      <span class="font-headline font-bold tracking-tight">Resumen</span>
    </a>

    <!-- ── Sección CRM ─────────────────────────────────────── -->
    <div class="pt-4">
      <p class="mb-1 px-4 text-[10px] font-bold uppercase tracking-widest text-stone-400 dark:text-stone-600">
        CRM
      </p>

      <a
        routerLink="/app/crm/oportunidades"
        routerLinkActive="bg-red-50 font-semibold text-red-700 border-r-4 border-red-700 dark:bg-red-950/30 dark:text-red-500 dark:border-red-500"
        [class]="navLinkInactive"
      >
        <span class="material-symbols-outlined" aria-hidden="true">trending_up</span>
        <span class="font-headline font-bold tracking-tight">Oportunidades</span>
      </a>

      <a
        routerLink="/app/crm/proyectos"
        routerLinkActive="bg-red-50 font-semibold text-red-700 border-r-4 border-red-700 dark:bg-red-950/30 dark:text-red-500 dark:border-red-500"
        [class]="navLinkInactive"
      >
        <span class="material-symbols-outlined" aria-hidden="true">folder_open</span>
        <span class="font-headline font-bold tracking-tight">Proyectos</span>
      </a>
    </div>

    <!-- ── Módulos operativos ──────────────────────────────── -->
    <div class="pt-4">
      <p class="mb-1 px-4 text-[10px] font-bold uppercase tracking-widest text-stone-400 dark:text-stone-600">
        Operaciones
      </p>

      <a
        routerLink="/app/empleados"
        routerLinkActive="bg-red-50 font-semibold text-red-700 border-r-4 border-red-700 dark:bg-red-950/30 dark:text-red-500 dark:border-red-500"
        [class]="navLinkInactive"
      >
        <span class="material-symbols-outlined" aria-hidden="true">badge</span>
        <span class="font-headline font-bold tracking-tight">Empleados</span>
      </a>

      <a
        routerLink="/app/tareas"
        routerLinkActive="bg-red-50 font-semibold text-red-700 border-r-4 border-red-700 dark:bg-red-950/30 dark:text-red-500 dark:border-red-500"
        [class]="navLinkInactive"
      >
        <span class="material-symbols-outlined" aria-hidden="true">task_alt</span>
        <span class="font-headline font-bold tracking-tight">Tareas</span>
      </a>

      <a
        routerLink="/app/sedes"
        routerLinkActive="bg-red-50 font-semibold text-red-700 border-r-4 border-red-700 dark:bg-red-950/30 dark:text-red-500 dark:border-red-500"
        [class]="navLinkInactive"
      >
        <span class="material-symbols-outlined" aria-hidden="true">location_on</span>
        <span class="font-headline font-bold tracking-tight">Sedes</span>
      </a>
    </div>
  </nav>

  <!-- Acciones y utilidades al fondo -->
  <div class="mt-auto space-y-1 border-t border-stone-200/10 pt-6">
    <a [class]="navLinkInactive" routerLink="/app/dashboard">
      <span class="material-symbols-outlined" aria-hidden="true">settings</span>
      <span class="font-headline font-bold tracking-tight">Configuración</span>
    </a>
  </div>
</aside>
